<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: blob: file: https:; media-src 'self' blob:; connect-src 'self' https:;">
  <title>Chorvy Crypto</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app-shell">
    <div id="titlebar">
      <div class="titlebar-traffic">
        <button id="btn-close" class="traffic-btn traffic-close" title="关闭"></button>
        <button id="btn-min" class="traffic-btn traffic-min" title="最小化"></button>
        <button id="btn-pin" class="traffic-btn traffic-pin" title="置顶">&#9670;</button>
      </div>
      <span class="titlebar-text">Chorvy Crypto</span>
      <div id="opacity-control" class="opacity-control">
        <button id="btn-opacity" class="titlebar-btn-icon" title="透明度">☼</button>
        <div id="opacity-slider-wrap" class="opacity-slider-wrap hidden">
          <input type="range" id="opacity-slider" class="opacity-slider" min="30" max="100" value="80" orient="vertical">
          <span id="opacity-value" class="opacity-value">80%</span>
        </div>
      </div>
      <button id="btn-refresh" class="titlebar-btn-icon" title="清除解密内容">&#8635;</button>
    </div>

    <div class="tab-bar">
      <button class="tab active" data-tab="decrypt">解密</button>
      <button class="tab" data-tab="encrypt">加密</button>
    </div>

    <div id="app">
      <!-- Decrypt Panel -->
      <div id="panel-decrypt" class="panel active">
        <div id="decrypt-main" class="decrypt-main">
          <div id="decrypt-drop-ui" class="decrypt-drop-ui">
            <div class="drop-icon">
              <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect x="6" y="8" width="36" height="32" rx="4" stroke="currentColor" stroke-width="1.5" opacity="0.3"/><circle cx="17" cy="18" r="3" stroke="currentColor" stroke-width="1.5" opacity="0.5"/><path d="M6 32l10-10 8 8 6-6 12 12" stroke="currentColor" stroke-width="1.5" opacity="0.5"/></svg>
            </div>
            <p class="drop-text">拖入加密图片</p>
            <p class="drop-sub">Duck 隐写 / 大番茄混淆 / CSPNG100</p>
            <p class="drop-hint">拖入 · 点击 · Ctrl+V 粘贴</p>
            <div id="drop-file-info" class="drop-file-info hidden">
              <span id="drop-file-name"></span>
              <span id="drop-file-mode"></span>
            </div>
          </div>
          <img id="preview-img" class="preview-full hidden" alt="">
          <video id="preview-video" class="preview-full hidden" controls></video>
        </div>
        <div id="decrypt-password-area" class="password-area hidden">
          <input type="password" id="decrypt-password" class="password-input" placeholder="输入解密密码（可选）...">
          <button id="btn-decrypt" class="btn primary full">开始解密</button>
        </div>
        <div id="decrypt-progress" class="progress-area hidden">
          <div class="progress-bar"><div id="decrypt-progress-fill" class="progress-fill"></div></div>
          <p id="decrypt-progress-text" class="progress-text"></p>
        </div>
        <button id="btn-view-file" class="btn secondary full hidden">查看图片</button>
      </div>

      <!-- Encrypt Panel -->
      <div id="panel-encrypt" class="panel">
        <div class="mode-selector">
          <label class="mode-option">
            <input type="radio" name="encrypt-mode" value="scramble" checked>
            <span class="mode-label">大番茄混淆</span>
            <span class="mode-desc">像素重排 · 仅图片</span>
          </label>
          <label class="mode-option">
            <input type="radio" name="encrypt-mode" value="duck">
            <span class="mode-label">Duck 隐写</span>
            <span class="mode-desc">鸭子图 · LSB · SS_tools</span>
          </label>
        </div>
        <div id="duck-compress-area" class="duck-compress-area hidden">
          <label class="compress-label">LSB 压缩深度</label>
          <select id="duck-compress" class="compress-select">
            <option value="2">2 bits (最小体积)</option>
            <option value="6">6 bits (平衡)</option>
            <option value="8" selected>8 bits (最高品质)</option>
          </select>
        </div>
        <div id="encrypt-file-area" class="encrypt-file-area">
          <div id="encrypt-drop-zone" class="encrypt-drop-zone">
            <span class="encrypt-drop-icon"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><path d="M14 4v14M8 10l6-6 6 6M4 20v2a2 2 0 002 2h16a2 2 0 002-2v-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/></svg></span>
            <p>拖入文件或点击选择</p>
            <p class="encrypt-file-type">图片 / 视频</p>
            <p id="encrypt-file-name" class="encrypt-file-name hidden"></p>
          </div>
          <img id="encrypt-original-preview" class="encrypt-original-preview hidden" alt="original">
          <input type="file" id="encrypt-file-input" hidden>
        </div>
        <div id="encrypt-password-area" class="password-area">
          <span id="encrypt-password-label" class="password-label">大番茄混淆无需密码</span>
          <input type="password" id="encrypt-password" class="password-input" placeholder="加密密码（可选，留空为无密码）..." disabled>
          <button id="btn-encrypt" class="btn primary full">开始加密</button>
        </div>
        <div id="encrypt-progress" class="progress-area hidden">
          <div class="progress-bar"><div id="encrypt-progress-fill" class="progress-fill"></div></div>
          <p id="encrypt-progress-text" class="progress-text"></p>
        </div>
        <div id="encrypt-result" class="result-area hidden">
          <img id="encrypt-preview" class="encrypt-preview hidden" alt="preview">
          <p id="encrypt-result-text"></p>
          <div class="result-buttons">
          <button id="btn-save-result" class="btn primary">确认保存</button>
          <button id="btn-copy-result" class="btn secondary">复制图片</button>
          <button id="btn-encrypt-reset" class="btn secondary">继续加密</button>
        </div>
        <p id="duck-copy-warning" class="duck-copy-warning hidden">Duck类型不支持直接复制分享，请储存文件后发送原图。</p>
        </div>
        <div id="encrypt-links" class="encrypt-links">
          <a href="https://github.com/Miqingzi/likeshare" class="encrypt-link" id="link-comfyui">本地大番茄ComfyUI节点</a>
          <a href="https://likehunyao.netlify.app/" class="encrypt-link" id="link-web-decode">网页解码</a>
        </div>
      </div>


    <div id="status-bar">
      <span id="status-text">就绪</span>
      <span id="status-pin" class="status-pin">置顶</span>
    </div>

    <div id="footer-config">
      <div class="footer-row">
        <span class="footer-label">查看器</span>
        <input type="text" id="viewer-path" class="footer-input" placeholder="系统默认" readonly>
        <button id="btn-pick-viewer" class="btn-footer">...</button>
        <button id="btn-toggle-viewer" class="btn-toggle on">ON</button>
      </div>
      <div class="footer-row">
        <span class="footer-label">保存到</span>
        <input type="text" id="save-path" class="footer-input" placeholder="点击 ... 设置" readonly>
        <button id="btn-pick-save-path" class="btn-footer">...</button>
        <button id="btn-toggle-save" class="btn-toggle">手动</button>
      </div>
      <button id="btn-save-file" class="btn primary full hidden">保存解密文件</button>
    </div>
  </div>
  <script src="../dist/renderer.js"></script>
</body>
</html>
